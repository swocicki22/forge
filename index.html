<head>

<title>Forge</title>

<style>
:root{--bg:#040608;--surface:#070a0e;--card:#0a0e14;--card2:#0f1520;--border:#132030;--bl:#1a3050;--hl:#4fc3f7;--hlb:#81d4fa;--hld:rgba(79,195,247,0.10);--hlbr:rgba(79,195,247,0.25);--en:#00e5ff;--am:#ffb300;--tx:#cfd8dc;--t2:#78909c;--st:#b0bec5;--s2:#546e7a;--s3:#2e3f4a;--sb:env(safe-area-inset-bottom,0px);--st2:env(safe-area-inset-top,0px);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:'Rajdhani',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}

.app{height:100vh;height:-webkit-fill-available;display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:1;}
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;}
.screen.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 14px 24px;}

.topbar{padding:10px 14px 8px;padding-top:calc(10px + var(--st2));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid var(--bl);background:var(--bg);position:relative;}

.logo{display:flex;align-items:center;gap:8px;}
.glyph{width:26px;height:26px;flex-shrink:0;}

.ssd{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--s2);padding:8px 13px 3px;display:flex;align-items:center;gap:7px;}

.abs{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--s2);letter-spacing:.05em;margin-top:2px;}
.cf{margin-top:13px;background:rgba(79,195,247,.03);border:1px solid var(--bl);border-radius:2px;padding:11px 13px;display:flex;gap:9px;align-items:flex-start;position:relative;overflow:hidden;}
.cf::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--hl),transparent);}
.cft{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:.1em;color:var(--hlb);margin-bottom:3px;}
.cfd{font-family:'Rajdhani',sans-serif;font-size:13px;color:var(--st);line-height:1.5;}
.fin{width:100%;background:transparent;border:1px solid var(--hlbr);color:var(--hlb);border-radius:2px;padding:15px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;letter-spacing:.14em;cursor:pointer;margin-top:13px;margin-bottom:14px;}

.ro{display:none;position:fixed;inset:0;background:rgba(4,6,8,.95);z-index:100;flex-direction:column;align-items:center;justify-content:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.ro.visible{display:flex;}
.ro::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(79,195,247,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(79,195,247,.04) 1px,transparent 1px);background-size:40px 40px;}
.rl{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:.26em;text-transform:uppercase;color:var(--s2);margin-bottom:22px;position:relative;}
.rc{width:188px;height:188px;position:relative;margin-bottom:22px;}

.rtr{fill:none;stroke:var(--border);stroke-width:3;}
.rfi{fill:none;stroke:var(--hl);stroke-width:3;stroke-linecap:square;filter:drop-shadow(0 0 5px var(--hl));}
.rcnt{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:50px;font-weight:700;color:var(--hlb);text-shadow:0 0 25px rgba(79,195,247,.45);}
.rsk{background:transparent;border:1px solid var(--bl);color:var(--st);border-radius:2px;padding:11px 30px;font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:.12em;cursor:pointer;margin-bottom:14px;position:relative;}

.rds{display:flex;gap:7px;}
.rd{background:transparent;border:1px solid var(--border);color:var(--s2);border-radius:2px;padding:5px 12px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;letter-spacing:.06em;}

function showScreen(id){

  if(id==='s-library')renderLib();
}

function uniqDates(log){
  var seen={},out=[];
  for(var i=0;i<log.length;i++){
    var d=new Date(log[i].date);d.setHours(0,0,0,0);
    var t=d.getTime();
    if(!seen[t]){seen[t]=1;out.push(t);}
  }
  out.sort(function(a,b){return b-a;});
  return out;
}

function maxA(arr){
  var m=1;
  for(var i=0;i<arr.length;i++){if(arr[i]>m)m=arr[i];}
  return m;
}

  var streak=0;
  var today=new Date();today.setHours(0,0,0,0);
  var ld=uniqDates(S.log);
  for(var i=0;i<ld.length;i++){var e2=new Date(today);e2.setDate(e2.getDate()-i);if(ld[i]===e2.getTime())streak++;else break;}

function getDay(id){for(var i=0;i<DAYS.length;i++){if(DAYS[i].id===id)return DAYS[i];}return null;}
function getLastLog(id){for(var i=S.log.length-1;i>=0;i--){if(S.log[i].dayId===id)return S.log[i];}return null;}

function startWkt(dayId){
  var day=getDay(dayId);
  S.day=day;S.sets={};S.start=Date.now();
  var ls=getLastLog(dayId);
  for(var i=0;i<day.ex.length;i++){
    var ex=day.ex[i];
    var dw=ex.dw,dr=ex.dr;
    if(ls&&ls.rawSets&&ls.rawSets[ex.name]){
      var lsd=ls.rawSets[ex.name];
      for(var k=lsd.length-1;k>=0;k--){if(lsd[k].done&&lsd[k].weight){dw=lsd[k].weight;dr=lsd[k].reps||dr;break;}}
    }
    var arr=[];for(var j=0;j<ex.ds;j++)arr.push({weight:dw,reps:dr,done:false});
    S.sets[ex.name]=arr;
  }
  el('wtitle').textContent='DAY '+day.lbl+' - '+day.name.toUpperCase();
  renderActive();showScreen('s-active');startTmr();
}

        sh+='<div class="step"><button class="sbtn" onclick="doStep(\''+ek+'\',\'r\','+j+',-1)">-</button>';
        sh+='<input class="sinp" type="number" inputmode="numeric" id="r-'+ek+'-'+j+'" value="'+(set.reps||'')+'" oninput="updS(\''+ex.name+'\','+j+',\'reps\',this.value)"/>';
        sh+='<button class="sbtn" onclick="doStep(\''+ek+'\',\'r\','+j+',1)">+</button></div>';
        sh+='<button class="schk'+(set.done?' done':'')+'" onclick="togS(\''+ex.name+'\','+j+')">'+(set.done?'&#10003;':'')+'</button>';
        sh+='</div>';
      }
      blk.innerHTML='<div class="eh"><div class="en">'+ex.name+'</div><div class="et" style="color:var(--en)">CORE</div></div><div class="shr"><div class="sc">#</div><div class="sc">WEIGHT</div><div class="sc">REPS</div><div class="sc">&#10003;</div></div>'+sh;
      list.appendChild(blk);
    }
  }
  if(day.cardio){
    var cf=document.createElement('div');cf.className='cf';
    cf.innerHTML='<div style="font-size:16px;flex-shrink:0">&#11041;</div><div><div class="cft">CARDIO FINISHER</div><div class="cfd">'+day.cardio+'</div></div>';
    list.appendChild(cf);
  }
  var fb=document.createElement('button');fb.className='fin';fb.textContent='COMMIT SESSION';
  fb.onclick=showFinMo;list.appendChild(fb);
}

function updProg(){
  var day=S.day;var tot=0,dn=0;
  for(var i=0;i<day.ex.length;i++){
    var sets=S.sets[day.ex[i].name];
    for(var j=0;j<sets.length;j++){tot++;if(sets[j].done)dn++;}
  }
  el('pfill').style.width=(tot?Math.round(dn/tot*100):0)+'%';
}

function updS(exName,idx,field,val){
  S.sets[exName][idx][field]=val===''?'':parseFloat(val)||val;
}

function doStep(ek,type,idx,delta){
  var day=S.day;var ex=null;
  for(var i=0;i<day.ex.length;i++){if(day.ex[i].name.replace(/[^a-zA-Z0-9]/g,'_')===ek){ex=day.ex[i];break;}}
  if(!ex)return;
  var field=type==='w'?'weight':'reps';
  var inp=el((type==='w'?'w-':'r-')+ek+'-'+idx);
  var cur=parseFloat(S.sets[ex.name][idx][field])||0;
  var nv=Math.max(0,cur+delta);
  if(type==='w')nv=Math.round(nv/2.5)*2.5;
  S.sets[ex.name][idx][field]=nv;
  if(inp)inp.value=nv||'';
}

function togS(exName,idx){
  var set=S.sets[exName][idx];
  var ek=exName.replace(/[^a-zA-Z0-9]/g,'_');
  var wi=el('w-'+ek+'-'+idx);var ri=el('r-'+ek+'-'+idx);
  if(wi&&wi.value)set.weight=parseFloat(wi.value)||set.weight;
  if(ri&&ri.value)set.reps=parseFloat(ri.value)||set.reps;
  set.done=!set.done;
  if(set.done&&set.weight){
    if(!S.prs[exName]||set.weight>S.prs[exName].weight)
      S.prs[exName]={weight:set.weight,date:new Date().toISOString()};
  }
  var row=el('sr-'+ek+'-'+idx);
  if(row){
    if(set.done)row.classList.add('done');else row.classList.remove('done');
    var btn=row.querySelector('.schk');
    if(set.done)btn.classList.add('done');else btn.classList.remove('done');
    btn.innerHTML=set.done?'&#10003;':'';
    var num=row.querySelector('.sn');
    if(num)num.style.color=set.done?'var(--hl)':'';
  }
  updProg();if(set.done)startRest();
}

function addS(exName){
  var sets=S.sets[exName];var last=sets[sets.length-1];
  sets.push({weight:last?last.weight:'',reps:last?last.reps:'',done:false});
  renderActive();
}

function startTmr(){
  if(S.tint)clearInterval(S.tint);
  S.tint=setInterval(function(){
    var e=Math.floor((Date.now()-S.start)/1000);
    var s=e%60;
    el('wclock').textContent=Math.floor(e/60)+':'+(s<10?'0':'')+s;
  },1000);
}

function endWkt(){if(S.tint)clearInterval(S.tint);skipRest();showScreen('s-home');}

function showFinMo(){
  var elapsed=Math.floor((Date.now()-S.start)/1000);
  var day=S.day;var ts=0,ds=0,vol=0;
  for(var i=0;i<day.ex.length;i++){
    var sets=S.sets[day.ex[i].name];
    for(var j=0;j<sets.length;j++){
      ts++;
      if(sets[j].done){ds++;vol+=(parseFloat(sets[j].weight)||0)*(parseFloat(sets[j].reps)||0);}
    }
  }
  el('finsum').innerHTML='PROTOCOL: '+day.name+'<br>DURATION: '+Math.floor(elapsed/60)+' MIN<br>SETS COMPLETED: '+ds+' / '+ts+'<br>TOTAL VOLUME: '+vol.toLocaleString()+' LBS';
  el('finmo').classList.add('visible');
}

function confirmFin(){
  var elapsed=Math.floor((Date.now()-S.start)/1000);
  var day=S.day;var ts=0,vol=0;
  var rawSets=JSON.parse(JSON.stringify(S.sets));
  for(var i=0;i<day.ex.length;i++){
    var sets=S.sets[day.ex[i].name];
    for(var j=0;j<sets.length;j++){
      if(sets[j].done){ts++;vol+=(parseFloat(sets[j].weight)||0)*(parseFloat(sets[j].reps)||0);}
    }
  }
  S.log.push({date:new Date().toISOString(),dayId:day.id,lbl:day.lbl,name:day.name,dur:Math.floor(elapsed/60)+' min',sets:ts,vol:Math.round(vol),rawSets:rawSets});
  save();closeModal('finmo');
  if(S.tint)clearInterval(S.tint);
  skipRest();showToast('SESSION COMMITTED');showScreen('s-home');
}

function startRest(){
  if(S.rint)clearInterval(S.rint);
  rRem=S.rdur;updRest();
  el('resto').classList.add('visible');
  S.rint=setInterval(function(){rRem--;updRest();if(rRem<=0)skipRest();},1000);
}
function updRest(){el('rcnt').textContent=rRem;el('rfill').style.strokeDashoffset=540*(1-rRem/S.rdur);}
function skipRest(){if(S.rint)clearInterval(S.rint);el('resto').classList.remove('visible');}
function setRD(s,btn){
  S.rdur=s;rRem=s;updRest();
  var bs=document.querySelectorAll('.rd');
  for(var i=0;i<bs.length;i++)bs[i].classList.remove('active');
  if(btn)btn.classList.add('active');
}

function swTab(tab,btn){
  aTab=tab;
  var ts=document.querySelectorAll('.ptb');
  for(var i=0;i<ts.length;i++)ts[i].classList.remove('active');
  if(btn)btn.classList.add('active');
  renderProg();
}

function renderProg(){
  var c=el('pcontent');c.innerHTML='';
  if(!S.log.length){c.innerHTML='<div class="es"><div class="ei">&#9678;</div><div class="et2">NO TELEMETRY DATA</div><div class="esb">Complete training sessions to populate data streams.</div></div>';return;}
  if(aTab==='volume')renderVol(c);
  else if(aTab==='prs')renderPRs(c);
  else renderFreq(c);
}

function renderVol(cont){
  var recent=S.log.slice(-10);
  var card=document.createElement('div');card.className='cc';
  card.innerHTML='<div class="ct">VOLUME OUTPUT &middot; LAST '+recent.length+' SESSIONS</div><canvas id="vc" height="140" style="width:100%"></canvas>';
  cont.appendChild(card);
  setTimeout(function(){
    var cv=el('vc');if(!cv)return;
    cv.width=cv.offsetWidth;cv.height=140;
    var ctx=cv.getContext('2d');
    var vols=[];for(var i=0;i<recent.length;i++)vols.push(recent[i].vol);
    var mx=maxA(vols);
    var W=cv.width,H=140,pt=10,pb=26,pl=6,pr=6;
    var cW=W-pl-pr,cH=H-pt-pb,st=vols.length>1?cW/(vols.length-1):cW;
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#132030';ctx.lineWidth=1;
    for(var i=0;i<=4;i++){var y=pt+cH-(i/4)*cH;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(W-pr,y);ctx.stroke();}
    var g=ctx.createLinearGradient(0,pt,0,pt+cH);g.addColorStop(0,'rgba(79,195,247,.18)');g.addColorStop(1,'rgba(79,195,247,0)');
    ctx.beginPath();
    for(var i=0;i<vols.length;i++){var x=pl+i*st,y=pt+cH-(vols[i]/mx)*cH;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.lineTo(pl+(vols.length-1)*st,pt+cH);ctx.lineTo(pl,pt+cH);ctx.closePath();ctx.fillStyle=g;ctx.fill();
    ctx.beginPath();ctx.strokeStyle='#4fc3f7';ctx.lineWidth=2;ctx.lineJoin='round';
    for(var i=0;i<vols.length;i++){var x=pl+i*st,y=pt+cH-(vols[i]/mx)*cH;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.stroke();
    for(var i=0;i<vols.length;i++){
      var x=pl+i*st,y=pt+cH-(vols[i]/mx)*cH;
      ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle='#4fc3f7';ctx.fill();
      ctx.fillStyle='#2e3f4a';ctx.font='8px monospace';ctx.textAlign='center';
      var d=new Date(recent[i].date);ctx.fillText((d.getMonth()+1)+'/'+(d.getDate()),x,H-5);
    }
  },80);
  var bar=document.createElement('div');bar.className='cc';bar.innerHTML='<div class="ct">VOLUME BY PROTOCOL</div>';
  var dv={};for(var i=0;i<DAYS.length;i++)dv[DAYS[i].id]=0;
  for(var i=0;i<S.log.length;i++){if(dv[S.log[i].dayId]!==undefined)dv[S.log[i].dayId]+=S.log[i].vol;}
  var vals=[];for(var k in dv)vals.push(dv[k]);
  var mdv=maxA(vals);
  for(var i=0;i<DAYS.length;i++){
    var day=DAYS[i];var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:9px;margin-bottom:9px;';
    var pct=Math.round(dv[day.id]/mdv*100);
    row.innerHTML='<div style="width:72px;font-family:monospace;font-size:8px;color:var(--s2);flex-shrink:0">DAY '+day.lbl+'</div><div style="flex:1;height:3px;background:var(--border);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--hl);"></div></div><div style="font-family:monospace;font-size:8px;color:var(--s2);width:54px;text-align:right">'+dv[day.id].toLocaleString()+'</div>';
    bar.appendChild(row);
  }
  cont.appendChild(bar);
}

function renderPRs(cont){
  var keys=Object.keys(S.prs);
  if(!keys.length){cont.innerHTML='<div class="es"><div class="ei">&#9672;</div><div class="et2">NO RECORDS YET</div><div class="esb">Log weights to track personal records.</div></div>';return;}
  var grid=document.createElement('div');grid.className='prg';
  for(var i=0;i<keys.length;i++){
    var k=keys[i];var pr=S.prs[k];var d=new Date(pr.date);
    var c=document.createElement('div');c.className='prc';
    c.innerHTML='<div class="pre">'+k+'</div><div class="prw">'+pr.weight+'<span style="font-size:10px;color:var(--s3)">LB</span></div><div class="prd">'+d.toLocaleDateString()+'</div>';
    grid.appendChild(c);
  }
  cont.appendChild(grid);
}

function renderFreq(cont){
  var counts={};for(var i=0;i<DAYS.length;i++)counts[DAYS[i].id]=0;
  for(var i=0;i<S.log.length;i++){if(counts[S.log[i].dayId]!==undefined)counts[S.log[i].dayId]++;}
  var vals=[];for(var k in counts)vals.push(counts[k]);
  var mc=maxA(vals);
  var card=document.createElement('div');card.className='cc';card.innerHTML='<div class="ct">SESSION FREQUENCY BY PROTOCOL</div>';
  for(var i=0;i<DAYS.length;i++){
    var day=DAYS[i];var row=document.createElement('div');row.style.cssText='display:flex;align-items:center;gap:9px;margin-bottom:11px;';
    var pct=Math.round(counts[day.id]/mc*100);
    row.innerHTML='<div style="width:72px;font-family:monospace;font-size:7px;color:var(--s2);flex-shrink:0">DAY '+day.lbl+'</div><div style="flex:1;height:3px;background:var(--border);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--hl);"></div></div><div style="font-family:monospace;font-size:9px;color:var(--hl);width:24px;text-align:right">'+counts[day.id]+'x</div>';
    card.appendChild(row);
  }
  cont.appendChild(card);
}

function uniqMuscles(){
  var seen={},out=['All'];
  for(var i=0;i<LIB.length;i++){if(!seen[LIB[i].muscle]){seen[LIB[i].muscle]=1;out.push(LIB[i].muscle);}}
  return out;
}

function renderLib(){
  var muscles=uniqMuscles();
  var mf=el('mfilt');mf.innerHTML='';
  for(var i=0;i<muscles.length;i++){
    var m=muscles[i];
    var c=document.createElement('div');c.className='mc'+(m===aMuscle?' active':'');
    c.textContent=m;
    (function(mu){c.onclick=function(){aMuscle=mu;renderLib();};})(m);
    mf.appendChild(c);
  }
  filtLib();
}

function filtLib(){
  var inp=el('srchi');var q=inp?inp.value.toLowerCase():'';
  var list=el('llist');list.innerHTML='';
  var out=[];
  for(var i=0;i<LIB.length;i++){
    var ex=LIB[i];
    var mm=aMuscle==='All'||ex.muscle===aMuscle;
    var ms=ex.name.toLowerCase().indexOf(q)>=0||ex.muscle.toLowerCase().indexOf(q)>=0;
    if(mm&&ms)out.push(ex);
  }
  if(!out.length){list.innerHTML='<div class="es"><div class="ei">&#11041;</div><div class="et2">NO RESULTS</div><div class="esb">Refine your query parameters.</div></div>';return;}
  for(var i=0;i<out.length;i++){
    var ex=out[i];
    var item=document.createElement('div');item.className='lbi';
    item.innerHTML='<div class="lbic">'+ex.em+'</div><div style="flex:1"><div class="lbn">'+ex.name+'</div><div class="lbm">'+ex.type.toUpperCase()+' &middot; '+ex.tip+'</div></div><div class="lbmu">'+ex.muscle.toUpperCase()+'</div>';
    list.appendChild(item);
  }
}

function closeModal(id){el(id).classList.remove('visible');}
function showToast(msg){var t=el('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

renderHome();renderSel();renderLib();
</script>
